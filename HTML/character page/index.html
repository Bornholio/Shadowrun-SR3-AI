<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowrun Characters</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #c8a96e;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #nav {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    background: #111;
    border-bottom: 2px solid #c8a96e44;
  }

  #nav button {
    background: #2a2a2a;
    color: #c8a96e;
    border: 1px solid #c8a96e55;
    padding: 7px 16px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  #nav button:hover { background: #3a3a2a; border-color: #c8a96e; }
  #nav button.active { background: #c8a96e22; border-color: #c8a96e; color: #f0d090; }

  #content {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 18px;
    letter-spacing: 3px;
  }

  #img-panel {
    width: 38%;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid #c8a96e22;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12px;
    background: #141414;
  }

  #img-panel img { max-width: 100%; border: 1px solid #c8a96e33; }

  #md-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  /* Markdown styles */
  .md h1 { font-size: 1.5em; color: #f0d090; border-bottom: 1px solid #c8a96e44; padding-bottom: 6px; margin-bottom: 14px; }
  .md h2 { font-size: 1.15em; color: #ddb96a; margin: 20px 0 8px; border-left: 3px solid #c8a96e66; padding-left: 8px; }
  .md h3 { font-size: 1em; color: #c8a96e; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
  .md p  { margin: 6px 0; line-height: 1.6; color: #b89a60; font-size: 0.9em; }
  .md em { color: #a08840; font-style: italic; }
  .md strong { color: #e0c070; font-weight: bold; }
  .md hr { border: none; border-top: 1px solid #c8a96e33; margin: 16px 0; }
  .md ul { margin: 6px 0 6px 18px; }
  .md li { color: #b89a60; font-size: 0.9em; margin: 3px 0; line-height: 1.5; }
  .md li strong { color: #e0c070; }
  .md table { border-collapse: collapse; width: 100%; margin: 8px 0 14px; font-size: 0.85em; }
  .md th { background: #2a2518; color: #ddb96a; border: 1px solid #c8a96e44; padding: 5px 10px; text-align: left; }
  .md td { border: 1px solid #c8a96e22; padding: 4px 10px; color: #b89a60; }
  .md tr:nth-child(even) td { background: #1e1c16; }

  #img-panel::-webkit-scrollbar, #md-panel::-webkit-scrollbar { width: 6px; }
  #img-panel::-webkit-scrollbar-track, #md-panel::-webkit-scrollbar-track { background: #111; }
  #img-panel::-webkit-scrollbar-thumb, #md-panel::-webkit-scrollbar-thumb { background: #c8a96e44; border-radius: 3px; }
</style>
</head>
<body>

<div id="nav"></div>
<div id="content">
  <div id="placeholder">SELECT A CHARACTER</div>
</div>

<script>
const CHARACTERS = ["Banshee", "Carpenter", "Crowbar", "Keystone", "Kluger", "Meridian", "Singer"];

// ── Markdown renderer ─────────────────────────────────────────────────────────

function renderMd(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function inline(s) {
    s = esc(s);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    return s;
  }

  while (i < lines.length) {
    const line = lines[i];

    const hm = line.match(/^(#{1,3})\s+(.+)/);
    if (hm) { html += `<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>\n`; i++; continue; }

    if (/^---+$/.test(line.trim())) { html += '<hr>\n'; i++; continue; }

    if (line.startsWith('|')) {
      const rows = [];
      while (i < lines.length && lines[i].startsWith('|')) { rows.push(lines[i]); i++; }
      const dataRows = rows.filter(r => !/^\|[\s|:-]+\|$/.test(r.trim()));
      if (dataRows.length === 0) continue;
      html += '<table>\n';
      dataRows.forEach((row, ri) => {
        const cells = row.split('|').slice(1, -1).map(c => c.trim());
        const tag = ri === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inline(c)}</${tag}>`).join('') + '</tr>\n';
      });
      html += '</table>\n';
      continue;
    }

    if (/^- /.test(line)) {
      html += '<ul>\n';
      while (i < lines.length && /^- /.test(lines[i])) {
        html += `<li>${inline(lines[i].slice(2))}</li>\n`;
        i++;
      }
      html += '</ul>\n';
      continue;
    }

    if (line.trim() === '') { i++; continue; }

    html += `<p>${inline(line)}</p>\n`;
    i++;
  }
  return html;
}

// ── UI ────────────────────────────────────────────────────────────────────────

const nav = document.getElementById('nav');
const contentDiv = document.getElementById('content');

CHARACTERS.forEach(name => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadCharacter(name);
  });
  nav.appendChild(btn);
});

function loadCharacter(name) {
  contentDiv.innerHTML = `
    <div id="img-panel"><img src="../shadowrun/CHARACTERS/${name}.png" alt="${name}"></div>
    <div id="md-panel"><div class="md"><p style="color:#555">Loading...</p></div></div>
  `;
  fetch(`../shadowrun/CHARACTERS/${name.toLowerCase()}.md`)
    .then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.text();
    })
    .then(text => {
      document.querySelector('#md-panel .md').innerHTML = renderMd(text);
    })
    .catch(() => {
      document.querySelector('#md-panel .md').innerHTML =
        `<p style="color:#c44">Could not load ${name.toLowerCase()}.md —
        open via a local server or enable file access in your browser.</p>`;
    });
}
</script>

</body>
</html>
